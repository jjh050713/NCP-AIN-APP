name: iOS Build

on:
  push:
    branches: [main, 'cursor/**']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Build for iOS Simulator
        run: |
          xcodebuild \
            -project NCPAINApp/NCPAINApp.xcodeproj \
            -scheme NCPAINApp \
            -configuration Release \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=17.5' \
            -derivedDataPath build/DerivedData \
            build

      - name: Package Simulator App
        run: |
          APP_PATH=$(find build/DerivedData -name 'NCPAINApp.app' -type d | head -1)
          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" dist/NCPAINApp-Simulator-iPhone.zip
          echo "Simulator app: $APP_PATH"

      - name: Archive (unsigned, for reference)
        run: |
          xcodebuild \
            -project NCPAINApp/NCPAINApp.xcodeproj \
            -scheme NCPAINApp \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/NCPAINApp.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" || true

      - name: Create unsigned IPA structure
        run: |
          APP=$(find build/NCPAINApp.xcarchive -name 'NCPAINApp.app' -type d 2>/dev/null | head -1 || true)
          if [[ -n "$APP" ]]; then
            mkdir -p dist/Payload
            cp -R "$APP" dist/Payload/
            cd dist && zip -r NCPAINApp-unsigned.ipa Payload && rm -rf Payload
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NCPAINApp-iOS-build
          path: |
            dist/
          if-no-files-found: warn
